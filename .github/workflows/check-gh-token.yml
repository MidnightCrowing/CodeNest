name: Check GH_TOKEN

on:
  workflow_dispatch:

jobs:
  check-token:
    runs-on: ubuntu-latest

    steps:
      - name: Check GH_TOKEN
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_TOKEN is not set in Secrets."
            exit 1
          fi

      - name: Validate GH_TOKEN
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/user)

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "GH_TOKEN validation failed with HTTP $status."
            exit 1
          fi
