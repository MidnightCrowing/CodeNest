shellEmulator: true

trustPolicy: no-downgrade

packages:
  - jetv-ui
overrides:
  '@electron/node-gyp': git+https://github.com/electron/node-gyp.git
  '@tootallnate/once': '>=3.0.1'
  flatted: '>=3.4.2'
  immutable: '>=5.1.5'
  minimatch: '>=3.1.3'
  picomatch: '>=4.0.4'
  rollup: '>=4.59.0'
  svgo: '>=4.0.1'
  tar: '>=7.5.7'
  undici: '>=6.24.0'
  yaml: '>=2.8.3'
onlyBuiltDependencies:
  - '@parcel/watcher'
  - better-sqlite3
  - electron
  - electron-winstaller
  - esbuild
  - lzma-native
  - oxc-resolver
  - simple-git-hooks
